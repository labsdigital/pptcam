<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Webcam Preview with 3 Draggable URL Windows</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Tab bar */
        #tab-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 200;
        }
        .tab {
            padding: 6px 16px;
            background-color: #2a2a2a;
            border: none;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, sans-serif;
            transition: all 0.2s;
        }
        .tab.active {
            background-color: #3a3a3a;
            color: #fff;
        }
        .tab:hover:not(.active) {
            background-color: #333;
            color: #aaa;
        }
        #tab-bar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #tab-bar input {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            background-color: #2a2a2a;
            color: #ccc;
            outline: none;
            font-size: 12px;
            width: 260px;
        }
        #tab-bar input::placeholder {
            color: #555;
        }
        #tab-bar button {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            background-color: #2a2a2a;
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, sans-serif;
        }
        #tab-bar button:hover {
            background-color: #3a3a3a;
            color: #fff;
        }

        /* Webcam */
        #video-container {
            position: fixed;
            top: 54px;
            left: 10px;
            width: 150px;
            height: 300px;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            background-color: #1e1e1e;
            cursor: move;
            z-index: 100;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #video-container .resize-handle {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 10px;
            height: 10px;
            background-color: #555;
            cursor: se-resize;
            border-radius: 50%;
        }

        /* URL Windows */
        .url-window {
            position: fixed;
            top: 54px;
            left: 180px;
            width: 1100px;
            height: 680px;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            background-color: #1e1e1e;
            cursor: move;
            display: none;
        }
        .url-window.active {
            display: block;
        }
        .url-window iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }
        .url-window .resize-handle {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 10px;
            height: 10px;
            background-color: #555;
            cursor: se-resize;
            border-radius: 50%;
        }
        .url-window .window-label {
            position: absolute;
            bottom: 6px;
            left: 10px;
            font-size: 10px;
            color: #555;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Tab bar -->
    <div id="tab-bar">
        <button class="tab active" data-index="0">1</button>
        <button class="tab" data-index="1">2</button>
        <button class="tab" data-index="2">3</button>
        <span style="color:#444;font-size:11px;margin-left:4px;margin-right:8px">|</span>
        <input type="text" id="url-input" placeholder="Paste URL here, Enter to load">
        <button onclick="resetUrlInput()">Go</button>
        <div id="load-status" style="margin-left:8px;font-size:11px;color:#555;min-width:80px;"></div>
    </div>

    <!-- Webcam -->
    <div id="video-container">
        <video id="video" autoplay></video>
        <div class="resize-handle"></div>
    </div>

    <!-- URL Windows -->
    <div class="url-window active" id="window-0">
        <iframe id="iframe-0"></iframe>
        <div class="resize-handle"></div>
        <div class="window-label">URL 1</div>
    </div>
    <div class="url-window" id="window-1">
        <iframe id="iframe-1"></iframe>
        <div class="resize-handle"></div>
        <div class="window-label">URL 2</div>
    </div>
    <div class="url-window" id="window-2">
        <iframe id="iframe-2"></iframe>
        <div class="resize-handle"></div>
        <div class="window-label">URL 3</div>
    </div>

    <script>
        const urls = [
            'https://www.rumahguru.org/tools/ppt.php',
            'about:blank',
            'about:blank'
        ];
        let activeIndex = 0;

        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            } catch (error) {
                console.error('Error accessing webcam:', error);
            }
        }

        function makeDraggable(element) {
            let isDragging = false;
            let offsetX, offsetY;

            element.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle')) return;
                isDragging = true;
                offsetX = e.clientX - element.getBoundingClientRect().left;
                offsetY = e.clientY - element.getBoundingClientRect().top;
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    element.style.left = `${e.clientX - offsetX}px`;
                    element.style.top = `${e.clientY - offsetY}px`;
                }
            });

            document.addEventListener('mouseup', () => { isDragging = false; });
        }

        function makeResizable(element) {
            const resizeHandle = element.querySelector('.resize-handle');
            let isResizing = false;
            let originalWidth, originalHeight, originalMouseX, originalMouseY;

            resizeHandle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isResizing = true;
                originalWidth = element.offsetWidth;
                originalHeight = element.offsetHeight;
                originalMouseX = e.clientX;
                originalMouseY = e.clientY;
            });

            document.addEventListener('mousemove', (e) => {
                if (isResizing) {
                    element.style.width = `${originalWidth + (e.clientX - originalMouseX)}px`;
                    element.style.height = `${originalHeight + (e.clientY - originalMouseY)}px`;
                }
            });

            document.addEventListener('mouseup', () => { isResizing = false; });
        }

        function switchTab(index) {
            activeIndex = index;
            document.querySelectorAll('.url-window').forEach((w, i) => {
                w.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            const short = urls[index].length > 45 ? urls[index].substring(0, 45) + '...' : urls[index];
            document.getElementById('url-input').placeholder = urls[index] === 'about:blank' ? 'Paste URL here, Enter to load' : short;
        }

        function showStatus(msg) {
            document.getElementById('load-status').textContent = msg;
        }

        function setActiveUrl(url) {
            if (!url) return;
            showStatus('Loading...');
            urls[activeIndex] = url;
            const iframe = document.getElementById(`iframe-${activeIndex}`);
            iframe.src = 'about:blank';
            setTimeout(() => { iframe.src = url; }, 50);
        }

        function resetUrlInput() {
            const input = document.getElementById('url-input');
            setActiveUrl(input.value);
            input.value = '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            startWebcam();

            document.getElementById('video-container').style.zIndex = 100;
            document.querySelectorAll('.url-window').forEach(w => {
                w.style.zIndex = 50;
            });

            makeDraggable(document.getElementById('video-container'));
            makeResizable(document.getElementById('video-container'));
            document.querySelectorAll('.url-window').forEach(w => {
                makeDraggable(w);
                makeResizable(w);
            });

            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(parseInt(tab.dataset.index)));
            });

            document.getElementById('url-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    setActiveUrl(e.target.value);
                    e.target.value = '';
                }
            });

            urls.forEach((url, i) => {
                const iframe = document.getElementById(`iframe-${i}`);
                iframe.src = url;
                iframe.addEventListener('load', () => showStatus('Loaded'));
                iframe.addEventListener('error', () => showStatus('Blocked'));
            });
        });
    </script>
</body>
</html>
